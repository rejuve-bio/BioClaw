# BioClaw â€” Phase 1: Conductor + AssistantOC + ReasonerOC.
#
# Bring up:    docker compose up -d
# Logs (all):  docker compose logs -f
# Logs (one):  docker compose logs -f conductor
# Tear down:   docker compose down            (keeps memory volumes)
# Reset:       docker compose down -v         (also wipes memory)
#
# Required env (read from .env file, written by scripts/bioclaw-up):
#   ANTHROPIC_API_KEY / OPENAI_API_KEY / ASI_API_KEY / ASIONE_API_KEY
#       â€” only the one matching LLM_PROVIDER needs to be set; the rest
#         default to empty and are ignored.
#   LLM_PROVIDER     ASIOne | Anthropic | OpenAI | ASICloud
#   EMBED_PROVIDER   Local | OpenAI
#   TG_BOT_TOKEN     conductor's telegram bot token
#   AUTH_SECRET      conductor's auth secret

x-common-env: &common-env
  OMEGACLAW_AUTH_SECRET: ${AUTH_SECRET}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ASI_API_KEY: ${ASI_API_KEY:-}
  ASIONE_API_KEY: ${ASIONE_API_KEY:-}
  # BioKG backend selection. Defaults to disabled until URI/password are set.
  BIOKG_BACKEND: ${BIOKG_BACKEND:-disabled}
  NEO4J_URI: ${NEO4J_URI:-}
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
  NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
  BIOKG_NAME_PROPERTIES: ${BIOKG_NAME_PROPERTIES:-}
  BIOCLAW_NAME_PROPERTIES: ${BIOCLAW_NAME_PROPERTIES:-}
  BIOCLAW_SCHEMA_FILE: ${BIOCLAW_SCHEMA_FILE:-/opt/bioclaw/config/schema.yaml}
  BIOCLAW_DATASOURCE_FILE: ${BIOCLAW_DATASOURCE_FILE:-/opt/bioclaw/config/data_sources.yaml}
  BIOKG_LOOKUP_MAX_DEPTH: ${BIOKG_LOOKUP_MAX_DEPTH:-2}
  BIOKG_LOOKUP_MULTIHOP_LIMIT: ${BIOKG_LOOKUP_MULTIHOP_LIMIT:-10}
  MORK_URI: ${MORK_URI:-}

services:
  conductor:
    image: bioclaw:phase0
    build:
      context: .
    container_name: bioclaw-conductor
    init: true
    tty: true
    stdin_open: true
    restart: unless-stopped
    depends_on:
      - assistant-oc
      - reasoner-oc
    environment:
      <<: *common-env
      BIOCLAW_PEERS: "assistant=http://assistant-oc:8080,reasoner=http://reasoner-oc:8080"
      BIOCLAW_PROMPT: "conductor"
    command:
      - "commchannel=${COMMCHANNEL:-telegram}"
      - "provider=${LLM_PROVIDER}"
      - "embeddingprovider=${EMBED_PROVIDER}"
      # Cap the prompt-history tail to reduce context bloat on weaker LLMs.
      - "maxHistory=${CONDUCTOR_MAX_HISTORY:-5000}"
      - "maxFeedback=${CONDUCTOR_MAX_FEEDBACK:-8000}"
      # Reactive mode â€” Conductor only acts on a HUMAN_MESSAGE; no autonomous
      # wake-ups (Conductor would just confabulate noise on idle ticks).
      # maxNewInputLoops=1: process each new IRC message exactly once.
      - "maxNewInputLoops=1"
      - "maxWakeLoops=0"
      - "wakeupInterval=86400"
      # Telegram args (used when COMMCHANNEL=telegram, which is the default)
      - "TG_BOT_TOKEN=${TG_BOT_TOKEN:-}"
      - "TG_POLL_TIMEOUT=20"
      # IRC args (used when COMMCHANNEL=irc)
      - "IRC_channel=${IRC_CHANNEL:-##omegaclaw}"
      - "IRC_server=${IRC_SERVER:-irc.quakenet.org}"
      - "IRC_port=${IRC_PORT:-6667}"
      - "IRC_user=${IRC_USER:-bioclaw}"
    volumes:
      - conductor-memory:/PeTTa/repos/OmegaClaw-Core/memory
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run:size=16m,mode=755
      - /var/tmp:size=64m,mode=1777

  assistant-oc:
    image: bioclaw:phase0
    container_name: bioclaw-assistant-oc
    init: true
    tty: true
    stdin_open: true
    restart: unless-stopped
    environment:
      <<: *common-env
      BIOCLAW_PROMPT: "assistant"
    command:
      - "commchannel=internal-rpc"
      - "provider=${LLM_PROVIDER}"
      - "embeddingprovider=${EMBED_PROVIDER}"
      - "maxHistory=${SPECIALIST_MAX_HISTORY:-3000}"
      - "maxFeedback=${SPECIALIST_MAX_FEEDBACK:-5000}"
      # Reactive specialist â€” biocurator-facing, no background work.
      # Specialists need maxNewInputLoops>=2 so they can call a skill on turn 1
      # and relay the result on turn 2.
      - "maxNewInputLoops=3"
      - "maxWakeLoops=0"
      - "wakeupInterval=86400"
      - "RPC_ROLE=assistant"
      - "RPC_PORT=8080"
    volumes:
      - assistant-memory:/PeTTa/repos/OmegaClaw-Core/memory
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run:size=16m,mode=755
      - /var/tmp:size=64m,mode=1777

  reasoner-oc:
    image: bioclaw:phase0
    container_name: bioclaw-reasoner-oc
    init: true
    tty: true
    stdin_open: true
    restart: unless-stopped
    environment:
      <<: *common-env
      BIOCLAW_PROMPT: "reasoner"
    command:
      - "commchannel=internal-rpc"
      - "provider=${LLM_PROVIDER}"
      - "embeddingprovider=${EMBED_PROVIDER}"
      - "maxHistory=${SPECIALIST_MAX_HISTORY:-3000}"
      - "maxFeedback=${SPECIALIST_MAX_FEEDBACK:-5000}"
      # Reactive â€” formal-reasoning compute on request. NAL / PLN subprocess
      # via sh /PeTTa/run.sh runs synchronously inside the skill call.
      - "maxNewInputLoops=3"
      - "maxWakeLoops=0"
      - "wakeupInterval=86400"
      - "RPC_ROLE=reasoner"
      - "RPC_PORT=8080"
    volumes:
      - reasoner-memory:/PeTTa/repos/OmegaClaw-Core/memory
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run:size=16m,mode=755
      - /var/tmp:size=64m,mode=1777

volumes:
  conductor-memory:
  assistant-memory:
  reasoner-memory:
