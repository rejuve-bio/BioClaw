# BioClaw Phase 0 — Conductor + 2 specialists.
#
# Bring up:    docker compose up -d
# Logs (all):  docker compose logs -f
# Logs (one):  docker compose logs -f conductor
# Tear down:   docker compose down            (keeps memory volumes)
# Reset:       docker compose down -v         (also wipes memory)
#
# Required env (read from .env file, written by scripts/bioclaw-up):
#   ANTHROPIC_API_KEY / OPENAI_API_KEY / ASI_API_KEY / ASIONE_API_KEY
#       — only the one matching LLM_PROVIDER needs to be set; the rest
#         default to empty and are ignored.
#   LLM_PROVIDER     ASIOne | Anthropic | OpenAI | ASICloud
#   EMBED_PROVIDER   Local | OpenAI
#   TG_BOT_TOKEN     conductor's telegram bot token
#   AUTH_SECRET      conductor's auth secret

x-common-env: &common-env
  OMEGACLAW_AUTH_SECRET: ${AUTH_SECRET}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ASI_API_KEY: ${ASI_API_KEY:-}
  ASIONE_API_KEY: ${ASIONE_API_KEY:-}
  # BioKG backend selection. Defaults to disabled until URI/password are set.
  BIOKG_BACKEND: ${BIOKG_BACKEND:-disabled}
  NEO4J_URI: ${NEO4J_URI:-}
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
  NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
  BIOKG_NAME_PROPERTIES: ${BIOKG_NAME_PROPERTIES:-}
  BIOCLAW_NAME_PROPERTIES: ${BIOCLAW_NAME_PROPERTIES:-}
  BIOCLAW_SCHEMA_FILE: ${BIOCLAW_SCHEMA_FILE:-/opt/bioclaw/config/schema.yaml}
  BIOCLAW_DATASOURCE_FILE: ${BIOCLAW_DATASOURCE_FILE:-/opt/bioclaw/config/data_sources.yaml}
  BIOKG_LOOKUP_MAX_DEPTH: ${BIOKG_LOOKUP_MAX_DEPTH:-2}
  BIOKG_LOOKUP_MULTIHOP_LIMIT: ${BIOKG_LOOKUP_MULTIHOP_LIMIT:-10}
  MORK_URI: ${MORK_URI:-}

services:
  conductor:
    image: bioclaw:phase0
    build:
      context: .
    container_name: bioclaw-conductor
    init: true
    tty: true
    stdin_open: true
    restart: unless-stopped
    depends_on:
      - query-oc
      - annotation-oc
      - relation-oc
      - provenance-oc
      - explanation-oc
      - conflict-oc
    environment:
      <<: *common-env
      BIOCLAW_PEERS: "query=http://query-oc:8080,annotation=http://annotation-oc:8080,relation=http://relation-oc:8080,provenance=http://provenance-oc:8080,explanation=http://explanation-oc:8080,conflict=http://conflict-oc:8080"
      BIOCLAW_PROMPT: "conductor"
    command:
      - "commchannel=${COMMCHANNEL:-telegram}"
      - "provider=${LLM_PROVIDER}"
      - "embeddingprovider=${EMBED_PROVIDER}"
      # Cap the prompt-history tail to reduce context bloat on weaker LLMs.
      - "maxHistory=${CONDUCTOR_MAX_HISTORY:-5000}"
      - "maxFeedback=${CONDUCTOR_MAX_FEEDBACK:-8000}"
      # Reactive mode — Conductor only acts on a HUMAN_MESSAGE; no autonomous
      # wake-ups (Conductor would just confabulate noise on idle ticks).
      - "maxNewInputLoops=3"
      - "maxWakeLoops=0"
      - "wakeupInterval=86400"
      # Telegram args (used when COMMCHANNEL=telegram, which is the default)
      - "TG_BOT_TOKEN=${TG_BOT_TOKEN:-}"
      - "TG_POLL_TIMEOUT=20"
      # IRC args (used when COMMCHANNEL=irc)
      - "IRC_channel=${IRC_CHANNEL:-##omegaclaw}"
      - "IRC_server=${IRC_SERVER:-irc.quakenet.org}"
      - "IRC_port=${IRC_PORT:-6667}"
      - "IRC_user=${IRC_USER:-bioclaw}"
    volumes:
      - conductor-memory:/PeTTa/repos/OmegaClaw-Core/memory
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run:size=16m,mode=755
      - /var/tmp:size=64m,mode=1777

  query-oc:
    image: bioclaw:phase0
    container_name: bioclaw-query-oc
    init: true
    tty: true
    stdin_open: true
    restart: unless-stopped
    environment:
      <<: *common-env
      BIOCLAW_PROMPT: "query"
    command:
      - "commchannel=internal-rpc"
      - "provider=${LLM_PROVIDER}"
      - "embeddingprovider=${EMBED_PROVIDER}"
      - "maxHistory=${SPECIALIST_MAX_HISTORY:-3000}"
      - "maxFeedback=${SPECIALIST_MAX_FEEDBACK:-5000}"
      # Reactive specialist — only acts on inbound HTTP requests.
      - "maxNewInputLoops=3"
      - "maxWakeLoops=0"
      - "wakeupInterval=86400"
      - "RPC_ROLE=query"
      - "RPC_PORT=8080"
    volumes:
      - query-memory:/PeTTa/repos/OmegaClaw-Core/memory
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run:size=16m,mode=755
      - /var/tmp:size=64m,mode=1777

  annotation-oc:
    image: bioclaw:phase0
    container_name: bioclaw-annotation-oc
    init: true
    tty: true
    stdin_open: true
    restart: unless-stopped
    environment:
      <<: *common-env
      BIOCLAW_PROMPT: "annotation"
    command:
      - "commchannel=internal-rpc"
      - "provider=${LLM_PROVIDER}"
      - "embeddingprovider=${EMBED_PROVIDER}"
      - "maxHistory=${SPECIALIST_MAX_HISTORY:-3000}"
      - "maxFeedback=${SPECIALIST_MAX_FEEDBACK:-5000}"
      # Reactive — proposes annotations ONLY when the user asks. Autonomous
      # annotation could be added later but Minimax can't be trusted with it.
      - "maxNewInputLoops=3"
      - "maxWakeLoops=0"
      - "wakeupInterval=86400"
      - "RPC_ROLE=annotation"
      - "RPC_PORT=8080"
    volumes:
      - annotation-memory:/PeTTa/repos/OmegaClaw-Core/memory
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run:size=16m,mode=755
      - /var/tmp:size=64m,mode=1777

  relation-oc:
    image: bioclaw:phase0
    container_name: bioclaw-relation-oc
    init: true
    tty: true
    stdin_open: true
    restart: unless-stopped
    environment:
      <<: *common-env
      BIOCLAW_PROMPT: "relation"
    command:
      - "commchannel=internal-rpc"
      - "provider=${LLM_PROVIDER}"
      - "embeddingprovider=${EMBED_PROVIDER}"
      - "maxHistory=${SPECIALIST_MAX_HISTORY:-3000}"
      - "maxFeedback=${SPECIALIST_MAX_FEEDBACK:-5000}"
      # Autonomous-contemplation mode. Wakes up every RELATION_WAKEUP seconds
      # (default 30 min) to run ONE bounded traversal pattern and possibly
      # stage one candidate edge. The prompt + the rate-limit skill enforce
      # bounds; everything still goes through staging + human approval.
      - "maxNewInputLoops=3"
      - "maxWakeLoops=${RELATION_MAX_WAKE_LOOPS:-1}"
      - "wakeupInterval=${RELATION_WAKEUP_INTERVAL:-1800}"
      - "RPC_ROLE=relation"
      - "RPC_PORT=8080"
    volumes:
      - relation-memory:/PeTTa/repos/OmegaClaw-Core/memory
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run:size=16m,mode=755
      - /var/tmp:size=64m,mode=1777

  provenance-oc:
    image: bioclaw:phase0
    container_name: bioclaw-provenance-oc
    init: true
    tty: true
    stdin_open: true
    restart: unless-stopped
    environment:
      <<: *common-env
      BIOCLAW_PROMPT: "provenance"
    command:
      - "commchannel=internal-rpc"
      - "provider=${LLM_PROVIDER}"
      - "embeddingprovider=${EMBED_PROVIDER}"
      - "maxHistory=${SPECIALIST_MAX_HISTORY:-3000}"
      - "maxFeedback=${SPECIALIST_MAX_FEEDBACK:-5000}"
      # Reactive — answers provenance questions on request, no background work.
      - "maxNewInputLoops=3"
      - "maxWakeLoops=0"
      - "wakeupInterval=86400"
      - "RPC_ROLE=provenance"
      - "RPC_PORT=8080"
    volumes:
      - provenance-memory:/PeTTa/repos/OmegaClaw-Core/memory
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run:size=16m,mode=755
      - /var/tmp:size=64m,mode=1777

  explanation-oc:
    image: bioclaw:phase0
    container_name: bioclaw-explanation-oc
    init: true
    tty: true
    stdin_open: true
    restart: unless-stopped
    environment:
      <<: *common-env
      BIOCLAW_PROMPT: "explanation"
    command:
      - "commchannel=internal-rpc"
      - "provider=${LLM_PROVIDER}"
      - "embeddingprovider=${EMBED_PROVIDER}"
      - "maxHistory=${SPECIALIST_MAX_HISTORY:-3000}"
      - "maxFeedback=${SPECIALIST_MAX_FEEDBACK:-5000}"
      # Reactive — explains on request, no background work.
      - "maxNewInputLoops=3"
      - "maxWakeLoops=0"
      - "wakeupInterval=86400"
      - "RPC_ROLE=explanation"
      - "RPC_PORT=8080"
    volumes:
      - explanation-memory:/PeTTa/repos/OmegaClaw-Core/memory
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run:size=16m,mode=755
      - /var/tmp:size=64m,mode=1777

  conflict-oc:
    image: bioclaw:phase0
    container_name: bioclaw-conflict-oc
    init: true
    tty: true
    stdin_open: true
    restart: unless-stopped
    environment:
      <<: *common-env
      BIOCLAW_PROMPT: "conflict"
    command:
      - "commchannel=internal-rpc"
      - "provider=${LLM_PROVIDER}"
      - "embeddingprovider=${EMBED_PROVIDER}"
      - "maxHistory=${SPECIALIST_MAX_HISTORY:-3000}"
      - "maxFeedback=${SPECIALIST_MAX_FEEDBACK:-5000}"
      # Reactive — reconciles evidence on request via PLN Truth_Revision.
      # No background work; the PLN math is invoked synchronously by the
      # biokg-pln-evidence-merge skill, which shells to /PeTTa/run.sh.
      - "maxNewInputLoops=3"
      - "maxWakeLoops=0"
      - "wakeupInterval=86400"
      - "RPC_ROLE=conflict"
      - "RPC_PORT=8080"
    volumes:
      - conflict-memory:/PeTTa/repos/OmegaClaw-Core/memory
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run:size=16m,mode=755
      - /var/tmp:size=64m,mode=1777

volumes:
  conductor-memory:
  query-memory:
  annotation-memory:
  relation-memory:
  provenance-memory:
  explanation-memory:
  conflict-memory:
